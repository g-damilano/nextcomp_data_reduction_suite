# Patch for src/methods/iso14126/curve_aggregation_policy.yaml

alignment:
  domain: experiment_progress
  source_boundaries: method_resolve.experiment_boundaries
  start: analysis_interval.start_index
  end: analysis_interval.end_index
  include_endpoint: true
  resample_points: 500

preserve:
  full_curve: true
  bounded_curve: true

outputs:
  include_boundary_columns: true
  boundary_columns:
    - boundary_start_index
    - boundary_end_index
    - boundary_start_policy
    - boundary_end_policy
    - alignment_domain
