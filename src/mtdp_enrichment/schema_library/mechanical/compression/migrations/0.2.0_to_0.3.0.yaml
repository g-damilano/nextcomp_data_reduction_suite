from_schema_version: 0.2.0
to_schema_version: 0.3.0
schema_id: mechanical.compression
status: active
notes:
  - Adds structured failure-observation metadata for ISO 14126 Failure Analysis.
  - Preserves clean legacy failure-mode values by moving them into Primary failure mode where possible.
  - Maps explicit ISO loading-method and specimen-type values to controlled choices; ambiguous legacy text is left unresolved.
operations:
