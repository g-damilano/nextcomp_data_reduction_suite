schema_id: mechanical.compression
schema_version: 0.3.0
label: Compression
status: active
test:
  family: mechanical
  mode: compression
package:
  granularity: dataset_with_runs
  raw_folder: raw
  normalized_folder: normalized
  normalized_extension: .csv
  run_id_pattern: run_{index:03d}
ui:
  groups:
  - Overview
  - Test Identification
  - Material Identification
  - Specimen Preparation
  - Loading Fixture
  - Test Conditions
  - Measurement Method
  - Deviations / Remarks
  - Specimen Geometry
  - Run Acquisition Inputs
  - Channel / Preamble Summary
  - User Validity / Failure Observation
dataset_grouping:
  enabled: true
  grouping_field: sample_type
  source_priority:
  - sidecar_field
  - parsed_token
  - filename_pattern
  - folder_name
  - manual
  parsed_tokens:
  - Sample type
  - Material condition
  - Treatment
  - Batch condition
  filename_grouping:
    delimiter_pattern: '[-_ ]+'
    remove_tokens:
    - Comp
    - Compression
    - Tensile
    - Tension
    - Flex
    - Flexural
    replicate_patterns:
    - E\d+$
    - R\d+$
    - Run\d+$
    - Specimen\d+$
    - Sample\d+$
  canonicalization:
    casefold: true
    replace_separators_with_space: true
    collapse_whitespace: true
    preserve_display_name: true
  matching:
    fuzzy_suggestions: true
    auto_merge_threshold: 0.98
    suggest_merge_threshold: 0.86
sidecar_import:
  enabled: true
  same_stem: true
  accepted_extensions:
  - .yaml
  - .yml
  canonical_versions:
  - 0.1.0
  unknown_keys: prompt_mapping
  conflict_policy: prefer_sidecar
  mapping_profile:
    enabled: true
    apply_to_same_signature: true
image_evidence:
  enabled: true
  required: false
  accepted_formats:
  - .jpg
  - .jpeg
  - .png
  - .tif
  - .tiff
  views:
  - id: front
    label: Front image
    required: false
    purpose:
    - audit
    - future_metrology
  - id: side
    label: Side image
    required: false
    purpose:
    - audit
    - future_metrology
  - id: top
    label: Top image
    required: false
    purpose:
    - audit
    - future_metrology
  - id: failure
    label: Failure image
    required: false
    purpose:
    - audit
    - failure_documentation
  - id: scale_reference
    label: Scale reference
    required: false
    purpose:
    - calibration
    - future_metrology
  - id: other
    label: Other image
    required: false
    purpose:
    - audit
supplemental_files:
  enabled: true
  accepted_scopes:
  - dataset
  - run
  - schema_mapping
  - calibration
  - equipment_evidence
  - other
  preserve_in_package: true
unit_system: mechanical_metric_mm_N
unit_systems:
  mechanical_metric_mm_N:
    dimensions:
      length:
        standard_unit: mm
        accepted_units:
        - m
        - cm
        - mm
        - um
      force:
        standard_unit: N
        accepted_units:
        - N
        - kN
      area:
        standard_unit: mm^2
        accepted_units:
        - m^2
        - cm^2
        - mm^2
      speed:
        standard_unit: mm/min
        accepted_units:
        - mm/min
        - m/s
      strain:
        standard_unit: mm/mm
        accepted_units:
        - mm/mm
        - usn
        - microstrain
      stress:
        standard_unit: MPa
        accepted_units:
        - Pa
        - kPa
        - MPa
        - N/mm^2
