data_table:
  format: tokenized_csv
  unit_row: true
  columns:
  - family: load
    label: Load
    required: true
    repeatable: false
    accepted_units:
    - N
    - kN
    standard_unit: N
    unit_dimension: force
  - family: extension
    label: Extension
    required: false
    repeatable: false
    accepted_units:
    - mm
    - cm
    - m
    standard_unit: mm
    unit_dimension: length
  - family: displacement
    label: Displacement
    required: false
    repeatable: false
    accepted_units:
    - mm
    - cm
    - m
    standard_unit: mm
    unit_dimension: length
  - family: strain
    label: Strain
    required: false
    repeatable: true
    accepted_units:
    - usn
    - microstrain
    - mm/mm
    standard_unit: mm/mm
    unit_dimension: strain
  - family: stress
    label: Stress
    required: false
    repeatable: true
    accepted_units:
    - MPa
    - N/mm2
    - N/mm^2
    standard_unit: MPa
    unit_dimension: stress
  - family: time
    label: Time
    required: false
    repeatable: false
    accepted_units:
    - s
    - ms
    - us
    standard_unit: s
    unit_dimension: time
unit_conversion_rules:
  kN->N: 1000
  N->kN: 0.001
  cm->mm: 10
  m->mm: 1000
  usn->mm/mm: 1.0e-06
  microstrain->mm/mm: 1.0e-06
  N/mm2->MPa: 1
  N/mm^2->MPa: 1
  ms->s: 0.001
  us->s: 1.0e-06
migration:
  compatible_prior_versions:
  - 0.1.0
