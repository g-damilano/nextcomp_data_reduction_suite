projection_id: audit_modulus_window
golden_id: golden_audit_modulus_window
version: 0.1.0
schema_version: plot_projection_recipe.v0_1
plot_type: audit_modulus_window_spec
production_state: production
surface_profiles:
  - surface: audit_report
    role: audit modulus-window stress-strain evidence
    renderer: audit report embedded Vega-Lite helper
data_contract:
  source_tables:
    - audit curve rows
  required_fields:
    - run_id
    - strain_mm_per_mm
    - stress_MPa
  optional_fields:
    - load_N
  forbidden_transforms:
    - modulus_window_reselection
    - stress_recalculation
transform_ids:
  - audit.modulus_window_passthrough.v1
semantic_contract:
  layers:
    - layer_id: stress_strain_curve
      semantic_role: audit stress-strain curve family
      required: true
    - layer_id: modulus_window_rules
      semantic_role: modulus window boundary rules
      required: true
quality_contract:
  requires_data: true
  requires_axis_labels: true
  requires_tooltips: false
staleness_contract:
  status_source: audit builder curve rows
  stale_if_curve_rows_missing: true
  stale_if_modulus_window_defaults_change: warning
artifact_contract:
  primary_artifacts:
    - audit/audit_report.html embedded Vega spec
  export_formats:
    - html
    - json
migration_metadata:
  current_builder: audit.vega_specs.modulus_window_spec
  current_router: audit.audit_report_builder._render_chart_component
  migration_status: audit-specific recipe declared; production rendering route preserved
  parity_reference: tests/golden/plots/test_golden_plot_contracts.py
