residuals:
  generated_exhaustive_tables:
    status: residual_not_blocking_process_flow_coverage
    examples:
      - full schema field CSV with field_id, scope, storage, report_role, report_importance, aliases
      - archive member manifest generated from fixture MTDP and MTDA archives
  tests_and_fixture_cross_checks:
    status: residual_not_blocking_process_flow_coverage
    examples:
      - contract tests asserting canonical archive members
      - parser numeric-risk fixtures
      - operation input/output fixtures
      - UI action enablement tests
  scientific_numeric_policy_deep_dives:
    status: residual_not_blocking_process_flow_coverage
    examples:
      - boundary resolution policy validation
      - bending persistence threshold justification
      - curve-family and curve-shape outlier policy justification
      - robust scalar outlier method notes
  screenshot_bound_ui_docs:
    status: residual_not_blocking_process_flow_coverage
    examples:
      - screenshot index against Dataset journey states
      - screenshot index against Analysis wizard states
  exact_dialog_state_machines:
    status: document_when_refactoring_dialogs
    examples:
      - mapping dialog
      - report completion dialog
      - review spotlight
  archive_versioning_policy:
    status: document_when_archive_schema_evolves
  human_portal_implementation:
    status: concept_documented_not_yet_implemented
    next_step: minimal_static_mkdocs_render_of_existing_process_flow_markdown
    guardrail: do_not_create_parallel_human_docs_or_handwritten_duplicate_content

update_triggers:
  - archive_structure_change
  - wizard_state_or_ui_route_change
  - parser_contract_change
  - grouping_validation_or_export_rule_change
  - sidecar_mapping_or_conflict_policy_change
  - schema_field_or_report_role_change
  - mapping_or_readiness_rule_change
  - method_recipe_or_operation_change
  - validation_or_acceptance_policy_change
  - report_audit_or_workbench_surface_change
  - finalization_or_amendment_change
  - human_portal_build_or_generated_dashboard_change
  - bug_reveals_undocumented_branch

local_tree_observation:
  source: uploaded_file_tree.txt
  status: noted
  interpretation: >
    The local tree includes many generated artifacts, extracted MTDA packages,
    screenshots, stage-cycle outputs, logs, and diagnostic folders. These are useful
    evidence/examples but should not be treated as the primary source-of-truth for
    code process ownership.
