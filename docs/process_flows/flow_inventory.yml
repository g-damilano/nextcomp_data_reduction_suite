version: 4
status: complete_drilldown_backbone_with_human_portal_concept
purpose: >
  Machine-readable inventory of process-flow documentation for the compression module.
  This inventory records the documented process-flow backbone, drill-down files,
  human visualization portal concept, and residual work classes that remain outside
  broad process-flow documentation.

coverage_position:
  process_backbone: documented
  human_visualization_portal: concept_documented
  drilldown_rounds_completed:
